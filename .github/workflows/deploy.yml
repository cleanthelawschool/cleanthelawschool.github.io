name: Deploy Quartz
on:
  push:
    branches:
      - main
  workflow_dispatch: # <-- 이 줄을 추가하십시오 (수동 실행 버튼 생성)


permissions:
  contents: write   # 저장소 내용을 읽고 쓸 권한
  pages: write      # GitHub Pages에 배포할 권한 (추가)
  id-token: write   # 배포용 인증 토큰을 생성할 권한 (추가)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4